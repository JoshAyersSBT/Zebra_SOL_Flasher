<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" fill="none">
  <!-- Sensor body -->
  <rect x="16" y="36" width="34" height="56" rx="6" fill="#000000"/>

  <!-- Sensor lenses -->
  <circle cx="33" cy="54" r="8" fill="#FFFFFF" stroke="#000000" stroke-width="3"/>
  <circle cx="33" cy="76" r="5" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>

  <!-- Target object -->
  <rect x="104" y="34" width="8" height="60" rx="2" fill="#000000"/>

  <!-- Distance measurement line (shortened) -->
  <line x1="50" y1="64" x2="96" y2="64" stroke="#000000" stroke-width="3" stroke-dasharray="5 4"/>

  <!-- Arrowheads -->
  <path d="M50 64 l6 -4 v8 z" fill="#000000"/>
  <path d="M96 64 l-6 -4 v8 z" fill="#000000"/>

  <!-- End ticks -->
  <line x1="50" y1="59" x2="50" y2="69" stroke="#000000" stroke-width="2"/>
  <line x1="96" y1="59" x2="96" y2="69" stroke="#000000" stroke-width="2"/>
</svg>